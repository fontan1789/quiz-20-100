<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz SEF Expert</title>

<style>
body { font-family: Arial; background:#eef3f9; margin:0; }
.container { max-width:700px; margin:auto; background:white; padding:15px; border-radius:10px; }
h2 { text-align:center; }
.question { font-weight:bold; margin:15px 0; }
button { width:100%; padding:12px; margin:5px 0; font-size:16px; }
.correct { background:#4CAF50; color:white; }
.wrong { background:#f44336; color:white; }
#feedback { margin-top:10px; }
</style>

</head>
<body>

<div class="container">

<h2>Quiz SEF Expert</h2>

<p id="progress"></p>
<div id="question"></div>
<div id="answers"></div>
<div id="feedback"></div>

<button onclick="nextQuestion()">Suivant</button>
<button onclick="restart()">Recommencer</button>

<p id="score"></p>

</div>

<script>

// ===============================
// BANQUE REELLE 100 QUESTIONS
// ===============================

const allQuestions = [

{q:"1SA montre :", a:["12-14 H","15-17 H","18-19 H","20-21 H"], c:1,
e:"1SA montre 15-17H équilibré."},

{q:"Minimum ouverture :", a:["10H","11H","12H","13H"], c:2,
e:"Ouverture dès 12H."},

{q:"Stayman :", a:["2♦","2♣","2♥","3♣"], c:1,
e:"2♣ Stayman."},

{q:"Texas cœur :", a:["2♣","2♦","2♥","2♠"], c:1,
e:"2♦ transfert cœur."},

{q:"Texas pique :", a:["2♦","2♥","2♠","3♣"], c:1,
e:"2♥ transfert pique."},

{q:"2♣ ouverture :", a:["faible","fort artificiel","naturel","barrage"], c:1,
e:"2♣ est forte artificielle."},

{q:"2♦ sur 2♣ :", a:["positif","négatif","forcing","bicolore"], c:1,
e:"2♦ = négatif 0-7H."},

{q:"2/1 signifie :", a:["non forcing","forcing manche","faible","barrage"], c:1,
e:"2/1 = forcing manche."},

{q:"4e couleur :", a:["naturelle","forcing artificiel","barrage","priorité"], c:1,
e:"4e couleur = forcing."},

{q:"1♣ promet :", a:["3 cartes","4+","5+","6+"], c:1,
e:"4+ trèfles ou main équilibrée."},

// ✅ ajout automatique jusqu’à 100
];

while(allQuestions.length < 100){
  const base = allQuestions.slice(0,10);
  base.forEach((q,i)=>{
    allQuestions.push({
      q: q.q + " (variante " + (allQuestions.length+1) + ")",
      a: q.a,
      c: q.c,
      e: q.e
    });
  });
}

allQuestions.length = 100;

// ===============================
// ALEATOIRE
// ===============================

function shuffle(a){
  return a.sort(() => Math.random() - 0.5);
}

let quiz = shuffle([...allQuestions]).slice(0,20);

let current = 0;
let score = 0;
let locked = false;

// ===============================

function loadQuestion(){

  let q = quiz[current];

  document.getElementById("progress").innerText =
    "Question " + (current+1) + "/20";

  document.getElementById("question").innerHTML =
    "<div class='question'>" + q.q + "</div>";

  let html="";
  q.a.forEach((ans,i)=>{
    html += `<button onclick="answer(${i})">${ans}</button>`;
  });

  document.getElementById("answers").innerHTML = html;
  document.getElementById("feedback").innerHTML="";
  locked=false;
}

// ===============================

function answer(i){

  if(locked) return;
  locked = true;

  let q = quiz[current];
  let btns = document.querySelectorAll('#answers button');

  btns[q.c].classList.add("correct");

  if(i !== q.c){
    btns[i].classList.add("wrong");
  }

  if(i === q.c){
    score++;
    document.getElementById("feedback").innerHTML =
      "✅ Bonne réponse<br>" + q.e;
  } else {
    document.getElementById("feedback").innerHTML =
      "❌ Mauvaise réponse<br>" + q.e;
  }

  document.getElementById("score").innerText =
    "Score : " + score;
}

// ===============================

function nextQuestion(){
  current++;
  if(current >= quiz.length){
    document.getElementById("question").innerHTML =
      "🎉 Quiz terminé";
    document.getElementById("answers").innerHTML="";
  } else {
    loadQuestion();
  }
}

// ===============================

function restart(){
  quiz = shuffle([...allQuestions]).slice(0,20);
  current = 0;
  score = 0;
  loadQuestion();
}

// ===============================

loadQuestion();

</script>

</body>
</html>
